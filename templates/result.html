<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #11998e, #38ef7d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .result-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
        }

        .score {
            font-size: 28px;
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="result-box">
    <h2>Exam Submitted Successfully</h2>
    <div class="score">Your Score: {{ score }}/50</div>
</div>

</body>
</html>
